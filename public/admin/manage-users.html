<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users | MemoryCare Companion</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/admin/dashboard.html" class="logo">
        <span class="logo-mark">M</span>
        MemoryCare
      </a>

      <div class="nav-links">
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/manage-users.html">Manage Users</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </nav>

  <main class="dashboard-container">
    <section class="dashboard-header">
      <span class="eyebrow">Admin Control</span>
      <h1>Manage Users</h1>
      <p>View users, update roles, and activate or deactivate accounts.</p>
    </section>

    <p class="form-message" id="adminMessage"></p>

    <section class="table-card">
      <div class="table-wrapper">
        <table class="users-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Change Role</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr>
              <td colspan="6">Loading users...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 MemoryCare Companion</p>
    <p class="footer-note">Crafted with care by RS & SS</p>
  </footer>

  <script src="/js/logout.js"></script>
  <script src="/js/admin-users.js"></script>
</body>
</html>
