<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | MemoryCare Companion</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-mark">M</span>
        MemoryCare
      </a>

      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login.html">Login</a>
      </div>
    </div>
  </nav>

  <main class="auth-container">
    <form class="auth-card" id="resetPasswordForm">
      <h2>Create New Password</h2>
      <p class="auth-subtitle">
        Your reset link is time-limited for account security.
      </p>

      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" required />
        <small class="hint">Minimum 8 characters.</small>
      </div>

      <button type="submit" class="btn-primary auth-btn">Reset Password</button>

      <p class="form-message" id="formMessage"></p>
    </form>
  </main>

  <footer class="footer">
    <p>&copy; 2026 MemoryCare Companion</p>
    <p class="footer-note">by Rameen & Sarah</p>
  </footer>

  <script src="/js/reset-password.js"></script>
</body>
</html>
