<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | MemoryCare Companion</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-mark">M</span>
        MemoryCare
      </a>

      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/signup.html" class="btn-nav">Sign Up</a>
      </div>
    </div>
  </nav>

  <main class="auth-container">
    <form class="auth-card" id="signupForm">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Choose your role and create your secure account.</p>

      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" required />
        <small class="error-message" id="fullNameError"></small>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required />
        <small class="error-message" id="emailError"></small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
        <small class="hint">Minimum 8 characters.</small>
        <small class="error-message" id="passwordError"></small>
      </div>

      <div class="form-group">
        <label for="role">Account Role</label>
        <select id="role" required>
          <option value="">Select role</option>
          <option value="user">User</option>
          <option value="caregiver">Caregiver</option>
          <option value="admin">Admin</option>
        </select>
        <small class="error-message" id="roleError"></small>
      </div>

      <button type="submit" class="btn-primary auth-btn">Create Account</button>

    <p class="auth-link">
        Already have an account? <a href="/login.html">Login</a>
    </p>

      <p class="form-message" id="formMessage"></p>
    </form>
  </main>

  <footer class="footer">
    <p>&copy; 2026 MemoryCare Companion</p>
    <p class="footer-note">Crafted with care by RS & SS</p>
  </footer>

  <script src="/js/signup.js"></script>
</body>
</html>
