<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | MemoryCare Companion</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-mark">M</span>
        MemoryCare
      </a>

      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/signup.html">Sign Up</a>
      </div>
    </div>
  </nav>

  <main class="auth-container">
    <form class="auth-card" id="loginForm">
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Login to continue to your dashboard.</p>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
      </div>

      <button type="submit" class="btn-primary auth-btn">Login</button>

      <p class="auth-link">
        Forgot your password? <a href="#">Reset it</a>
      </p>

      <p class="form-message" id="formMessage"></p>
    </form>
  </main>

  <footer class="footer">
    <p>&copy; 2026 MemoryCare Companion</p>
    <p class="footer-note">Crafted with care by RS & SS</p>
  </footer>

  <script src="/js/login.js"></script>
</body>
</html>
