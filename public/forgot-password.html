<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | MemoryCare Companion</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-mark">M</span>
        MemoryCare
      </a>

      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login.html">Login</a>
      </div>
    </div>
  </nav>

  <main class="auth-container">
    <form class="auth-card" id="forgotPasswordForm">
      <h2>Reset Password</h2>
      <p class="auth-subtitle">
        Enter your email address to generate a secure reset link.
      </p>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required />
      </div>

      <button type="submit" class="btn-primary auth-btn">Generate Reset Link</button>

      <p class="auth-link">
        Remembered your password? <a href="/login.html">Login</a>
      </p>

      <p class="form-message" id="formMessage"></p>

      <div class="reset-link-box" id="resetLinkBox" style="display: none;">
        <p>Reset link:</p>
        <a href="#" id="resetLink"></a>
      </div>
    </form>
  </main>

  <footer class="footer">
    <p>&copy; 2026 MemoryCare Companion</p>
    <p class="footer-note">Crafted with care by RS & SS</p>
  </footer>

  <script src="/js/forgot-password.js"></script>
</body>
</html>
